var _k="00000000@";
function _dec(d,k){
  // base64 -> Uint8Array -> XOR -> TextDecoder UTF-8
  var raw=atob(d);
  var buf=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)buf[i]=raw.charCodeAt(i);
  var kbuf=new TextEncoder().encode(k);
  var out=new Uint8Array(buf.length);
  for(var i=0;i<buf.length;i++)out[i]=buf[i]^kbuf[i%kbuf.length];
  return new TextDecoder('utf-8').decode(out);
}

}
