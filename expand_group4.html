<head>
<meta charset="UTF-8">

<title>拓展四组 BI 看板 · 加密版</title>
<style>
:root{--bg:#F4F6FB;--surface:#fff;--border:#E4E9F2;--indigo:#4361EE;--text:#1A2340;--sub:#6B7A99;}
*{box-sizing:border-box}
body{margin:0;font-family:PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text)}
.card{background:var(--surface);width:min(92vw,380px);border-radius:18px;padding:34px 28px;box-shadow:0 12px 36px rgba(67,97,238,.16);border:1px solid var(--border);text-align:center}
.title{font-size:1.35rem;font-weight:900;margin:0 0 6px}
.sub{font-size:.88rem;color:var(--sub);margin:0 0 22px}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none}
button{margin-top:12px;width:100%;padding:12px 14px;border:0;border-radius:10px;background:var(--indigo);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.err{height:20px;margin-top:10px;color:#EF4444;font-size:.84rem}
.tip{margin-top:10px;color:var(--sub);font-size:.8rem}
</style>
</head>
